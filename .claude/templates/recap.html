<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Epic Recap: {{EPIC_NAME}}</title>
<style>
  :root {
    --bg: #0d1117;
    --bg-secondary: #161b22;
    --bg-tertiary: #21262d;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --red: #f85149;
    --yellow: #d29922;
    --purple: #bc8cff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    max-width: 960px;
    margin: 0 auto;
    padding: 2rem 2rem 4rem;
  }

  h1 {
    font-size: 2rem;
    border-bottom: 1px solid var(--border);
    padding-bottom: 0.5rem;
    margin-bottom: 1.5rem;
    color: var(--accent);
  }

  h2 {
    font-size: 1.4rem;
    margin-top: 2rem;
    margin-bottom: 0.75rem;
    color: var(--text);
    border-bottom: 1px solid var(--border);
    padding-bottom: 0.3rem;
  }

  h3 {
    font-size: 1.1rem;
    margin-top: 1.5rem;
    margin-bottom: 0.5rem;
    color: var(--text-muted);
  }

  p { margin-bottom: 0.75rem; }

  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }

  code {
    background: var(--bg-tertiary);
    padding: 0.15em 0.4em;
    border-radius: 4px;
    font-size: 0.9em;
    font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
  }

  pre {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 1rem;
    overflow-x: auto;
    margin-bottom: 1rem;
  }

  pre code {
    background: none;
    padding: 0;
    font-size: 0.85em;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 1rem;
  }

  th, td {
    border: 1px solid var(--border);
    padding: 0.5rem 0.75rem;
    text-align: left;
  }

  th {
    background: var(--bg-secondary);
    color: var(--accent);
    font-weight: 600;
  }

  tr:nth-child(even) { background: var(--bg-secondary); }

  ul, ol {
    margin-bottom: 0.75rem;
    padding-left: 1.5rem;
  }

  li { margin-bottom: 0.25rem; }

  blockquote {
    border-left: 3px solid var(--accent);
    padding-left: 1rem;
    margin-bottom: 0.75rem;
    color: var(--text-muted);
  }

  hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 2rem 0;
  }

  .mermaid {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 1rem;
    margin-bottom: 1rem;
    text-align: center;
  }

  .footer {
    margin-top: 3rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
    color: var(--text-muted);
    font-size: 0.85rem;
    text-align: center;
  }

  /* Status badges */
  .status-closed, .status-completed { color: var(--green); }
  .status-open, .status-in-progress { color: var(--yellow); }
  .status-descoped { color: var(--red); }
</style>
</head>
<body>
<div id="content"></div>
<div class="footer">Generated by <code>/pm:epic-recap</code> &mdash; Options Arena</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
const markdown = `{{MARKDOWN_CONTENT}}`;

document.getElementById('content').innerHTML = marked.parse(markdown);

// Check if any mermaid blocks exist before loading the library
const mermaidBlocks = document.querySelectorAll('code.language-mermaid');
if (mermaidBlocks.length > 0) {
  // Convert code blocks to mermaid divs
  mermaidBlocks.forEach(block => {
    const pre = block.parentElement;
    const div = document.createElement('div');
    div.className = 'mermaid';
    div.textContent = block.textContent;
    pre.replaceWith(div);
  });

  // Load mermaid.js dynamically
  const script = document.createElement('script');
  script.src = 'https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js';
  script.onload = () => {
    mermaid.initialize({
      startOnLoad: true,
      theme: 'dark',
      themeVariables: {
        primaryColor: '#58a6ff',
        primaryTextColor: '#e6edf3',
        lineColor: '#30363d',
        secondaryColor: '#161b22',
        tertiaryColor: '#21262d'
      }
    });
    mermaid.run();
  };
  document.head.appendChild(script);
}
</script>
</body>
</html>
