name: CI
on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: "Gate 1: Lint & Format"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: uv python install 3.13
      - run: uv sync --dev
      - name: Ruff check
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .

  typecheck:
    name: "Gate 2: Type Check"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: uv python install 3.13
      - run: uv sync --dev
      - name: mypy strict
        run: uv run mypy src/ --strict

  test:
    name: "Gate 3: Python Tests"
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: uv python install 3.13
      - run: uv sync --dev
      - name: Run tests
        run: uv run pytest tests/ -v --tb=short --junitxml=test-results.xml
        env:
          ARENA_DATA__DB_PATH: ":memory:"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results.xml

  changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      api: ${{ steps.filter.outputs.api }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            web:
              - 'web/**'
            api:
              - 'src/options_arena/api/**'

  e2e:
    name: "Gate 4: E2E Tests"
    runs-on: ubuntu-latest
    needs: [test, changes]
    if: needs.changes.outputs.web == 'true' || needs.changes.outputs.api == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: uv python install 3.13
      - run: uv sync --dev
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install frontend deps
        run: npm ci
        working-directory: web
      - name: Build frontend
        run: npm run build
        working-directory: web
      - name: Install Playwright
        run: npx playwright install chromium --with-deps
        working-directory: web
      - name: Run E2E tests
        run: npx playwright test
        working-directory: web/e2e
        env:
          CI: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-report
          path: web/e2e/reports/
