name: Post-Merge Verification
on:
  push:
    branches: [master]

jobs:
  verify:
    name: Full Suite on Master
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: uv python install 3.13
      - run: uv sync --dev
      - run: uv run ruff check .
      - run: uv run mypy src/ --strict
      - run: uv run pytest tests/ -v --tb=short
        env:
          ARENA_DATA__DB_PATH: ":memory:"

      - name: Create bug issue on failure
        if: failure()
        run: |
          PR=$(gh api repos/${{ github.repository }}/commits/${{ github.sha }}/pulls \
            --jq '.[0].number' 2>/dev/null || echo "unknown")
          gh issue create \
            --title "Post-merge failure on master (PR #${PR})" \
            --body "Master is broken after merging PR #${PR}.
          Commit: ${{ github.sha }}
          Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          Action required: investigate and fix immediately." \
            --label "bug,needs-human"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
